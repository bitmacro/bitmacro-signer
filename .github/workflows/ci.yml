name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run lint

      - name: Upload coverage (lcov)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-lcov
          path: coverage/lcov.info
