# `docker compose up --build` — serviço web (Next standalone) + daemon (bunker NIP-46).
# Variáveis: copiar `.env.example` → `.env` e preencher (serviços partilham `.env`; ver chaves só-daemon abaixo).

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  daemon:
    build:
      context: .
      dockerfile: Dockerfile.daemon
    env_file:
      - .env
    environment:
      NODE_ENV: production
    restart: unless-stopped
